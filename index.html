<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>
<body>
    <div class="login-container">
        <h1>Login Form</h1>
        <div class="login-row">
            <label for="username">Username: </label>
            <input type="text" id="username-text-box" placeholder="Enter your username.">
        </div>
        <div class="login-row">
            <label for="password">Password: </label>
            <input type="text" id="password-text-box"  placeholder="Enter your password.">
        </div>
            <button >Log in</button>
            <br>
            <br>
            <hr/>
        <a href="">Forgot your password?</a>
        <div class="half-circle"></div>
    </div>
    </div>
</body>
</html>
